<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacTacToe</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body class="login-body">
    <div class="ambient"></div>
    <div class="noise"></div>
    <div class="page-content login-body">
        <div class="login-card">
            <div class="logo">
                <span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span>
            </div>
            <p class="login-subtitle">Enter your name to start playing</p>
            <form action="/login" method="post" class="guest-form">
                <input type="text" name="name" placeholder="Your name" maxlength="20" required class="guest-input" autocomplete="off" />
                <input type="hidden" name="returnUrl" id="returnUrl" value="/lobby" />
                <button type="submit" class="guest-btn">Let's Play</button>
            </form>
        </div>
    </div>
    <script>
        const ret = new URLSearchParams(window.location.search).get("returnUrl");
        if (ret && ret.startsWith("/")) document.getElementById("returnUrl").value = ret;
    </script>
</body>
</html>
