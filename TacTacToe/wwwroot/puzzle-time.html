<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TacTacToe &#8211; Puzzle Time</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="ambient"></div>
    <div class="noise"></div>
    <div class="page-content">
        <nav class="navbar">
            <button class="ham-btn" onclick="hamOpen()" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="logo-sm"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <a href="/profile" class="nav-profile-btn" title="Edit Profile">
                <span id="navbarAvatarEmoji" class="nav-profile-emoji" style="display:none"></span>
                <img id="navbarAvatarImg" class="nav-profile-img" src="" alt="Profile" style="display:none">
                <span id="navbarAvatarPlaceholder" class="nav-profile-placeholder">&#128100;</span>
                <span id="navbarUsername" class="nav-profile-username"></span>
            </a>
        </nav>

        <main class="puzzle-time-container">
            <!-- Head bar (title + inline preview + controls) -->
            <div class="puzzle-time-head glass-card">
                <div class="pt-head-title">
                    <h2 class="lobby-title" style="margin-bottom:0.2rem;">Puzzle Time</h2>
                    <div id="puzzleStatusText" class="turn-indicator" style="margin:0;">Loading puzzle&#8230;</div>
                </div>
                <div class="pt-head-preview">
                    <canvas id="ptPreviewCanvas" class="pt-preview-canvas"></canvas>
                    <p class="lobby-hint pt-progress-text" id="ptProgressText"></p>
                </div>
                <div class="pt-head-controls">
                    <label class="pt-toggle-label">
                        <input type="checkbox" id="showHintsChk">
                        <span>Hints</span>
                    </label>
                </div>
            </div>

            <!-- Player bar -->
            <div id="puzzlePlayers" class="player-bar" style="margin-bottom:0.55rem;"></div>

            <!-- Board (full width — tray zone is rendered inside the board by JS) -->
            <section class="pt-board-section">
                <div id="pt-board" class="pt-board">
                    <!-- Ghost slot SVG injected by JS -->
                    <!-- Tray background div injected by JS -->
                    <!-- Piece SVG elements positioned by JS -->
                </div>
                <p id="puzzleLockHint" class="lobby-hint pt-board-hint">Click a piece to select it &mdash; click again to rotate. Drag to move.</p>
            </section>
        </main>
    </div>

    <!-- Result overlay -->
    <div id="resultOverlay" class="result-overlay" style="display:none">
        <div class="result-card">
            <h2 id="resultText"></h2>
            <button id="playAgainBtn" class="btn btn-accept" style="margin-bottom:0.5rem;">&#8635; Play Again</button>
            <button id="backToLobby" class="btn btn-outline">Back to Lobby</button>
            <div class="leaderboard-panel" style="margin-top:1rem;">
                <div class="leaderboard-panel-tabs">
                    <button class="lb-tab active" onclick="showLbTab(this,'pt-lb')" aria-label="Show top scores">&#127942; Top Scores</button>
                    <button class="lb-tab" onclick="showLbTab(this,'pt-hist')" aria-label="Show my history">&#128196; My History</button>
                </div>
                <div class="lb-body" id="pt-lb"></div>
                <div class="lb-body" id="pt-hist" style="display:none"></div>
            </div>
        </div>
    </div>

    <!-- Chat widget (multiplayer only) -->
    <div id="chatWidget" class="chat-widget">
        <button id="chatToggle" class="chat-toggle">&#128172; <span id="chatBadge" class="chat-badge" style="display:none">0</span></button>
        <div id="chatPanel" class="chat-panel" style="display:none">
            <div class="chat-header"><span>Game Chat</span><button id="chatClose" class="chat-close">&#x2715;</button></div>
            <div id="chatMessages" class="chat-messages"></div>
            <div class="chat-input-row">
                <input id="chatInput" class="chat-input" placeholder="Type a message&#8230;" maxlength="500">
                <button id="chatSend" class="chat-send">&#10148;</button>
            </div>
        </div>
    </div>

    <script src="/js/signalr.min.js"></script>
    <script src="/js/avatarCache.js"></script>
    <script src="/js/leaderboard.js"></script>
    <script src="/js/puzzle-time.js"></script>
    <script>
        function showLbTab(btn, id) {
            btn.closest('.leaderboard-panel').querySelectorAll('.lb-tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            btn.closest('.leaderboard-panel').querySelectorAll('.lb-body').forEach(b => b.style.display = 'none');
            document.getElementById(id).style.display = '';
        }
        document.addEventListener('gameOver', () => {
            setTimeout(() => {
                loadLeaderboard('PuzzleTime', document.getElementById('pt-lb'));
                loadPersonalHistory('PuzzleTime', document.getElementById('pt-hist'));
            }, 1200);
        });
    </script>

    <div class="ham-overlay" onclick="hamClose()"></div>
    <nav class="ham-drawer" aria-label="Navigation menu">
        <div class="ham-drawer-header">
            <div class="ham-drawer-logo"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <button class="ham-close" onclick="hamClose()" aria-label="Close menu">&#10005;</button>
        </div>
        <div class="ham-menu">
            <button id="backBtn" class="ham-item">&#8592; Back to Lobby</button>
        </div>
    </nav>
    <script src="/js/hamburger.js"></script>
</body>
</html>
