<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TacTacToe &#8211; Yahtzee Room</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="ambient"></div>
    <div class="noise"></div>
    <div class="page-content">
        <nav class="navbar">
            <button class="ham-btn" onclick="hamOpen()" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="logo-sm"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <a href="/profile" class="nav-profile-btn" title="Edit Profile">
                <span id="navbarAvatarEmoji" class="nav-profile-emoji" style="display:none"></span>
                <img id="navbarAvatarImg" class="nav-profile-img" src="" alt="Profile" style="display:none">
                <span id="navbarAvatarPlaceholder" class="nav-profile-placeholder">&#128100;</span>
            </a>
        </nav>
        <main class="room-container">
            <h2 class="lobby-title" id="roomTitle">Yahtzee Room</h2>
            <div class="room-invite-bar glass-card">
                <div class="room-invite-code">
                    <span class="room-invite-label">Room Code</span>
                    <span class="room-code-value" id="roomCode"></span>
                </div>
                <button id="copyCodeBtn" class="btn-copy" title="Copy room code">&#128203; Copy Code</button>
                <button id="copyLinkBtn" class="btn-copy btn-copy-link" title="Copy invite link">&#128279; Copy Invite Link</button>
            </div>

            <!-- Player list -->
            <div class="room-section glass-card">
                <h3 class="room-section-title">Players</h3>
                <div id="roomPlayers" class="room-player-list"></div>
            </div>

            <!-- Settings (host only) -->
            <div id="settingsPanel" class="room-section glass-card" style="display:none">
                <h3 class="room-section-title">Game Settings <span class="room-host-badge">HOST</span></h3>
                <div class="settings-grid settings-basic">
                    <label>Room Name<input type="text" id="sRoomName" class="setting-input" maxlength="30" value="Yahtzee Room"></label>
                    <label>Max Players (2-20)<input type="number" id="sMaxPlayers" class="setting-input" min="2" max="20" value="4"></label>
                    <label>Turn Time Limit (0=off)<input type="number" id="sTurnTime" class="setting-input" min="0" max="300" value="0"></label>
                    <label class="setting-check"><input type="checkbox" id="sPrivate"> Private Room</label>
                </div>
                <button class="btn-advanced-toggle" id="advancedToggle">&#9881; Advanced Settings <span id="advancedArrow">&#9660;</span></button>
                <div class="settings-grid settings-advanced" id="advancedSettings" style="display:none;margin-top:12px;">
                    <label>Rolls Per Turn (1-5)<input type="number" id="sRollsPerTurn" class="setting-input" min="1" max="5" value="3"></label>
                    <label>Number of Dice (3-8)<input type="number" id="sNumDice" class="setting-input" min="3" max="8" value="5"></label>
                    <label>Upper Bonus Threshold<input type="number" id="sUpperThreshold" class="setting-input" min="0" max="999" value="63"></label>
                    <label>Upper Bonus Points<input type="number" id="sUpperBonus" class="setting-input" min="0" max="100" value="35"></label>
                    <label>Full House Score<input type="number" id="sFullHouse" class="setting-input" min="0" max="100" value="25"></label>
                    <label>Sm Straight Score<input type="number" id="sSmStraight" class="setting-input" min="0" max="100" value="30"></label>
                    <label>Lg Straight Score<input type="number" id="sLgStraight" class="setting-input" min="0" max="100" value="40"></label>
                    <label>Yahtzee Score<input type="number" id="sYahtzee" class="setting-input" min="0" max="100" value="50"></label>
                    <label class="setting-check"><input type="checkbox" id="sForce"> Force Best Category</label>
                </div>
                <button id="saveSettingsBtn" class="btn btn-accept" style="margin-top:1rem;">Save Settings</button>
            </div>

            <!-- Settings (non-host, read-only) -->
            <div id="settingsReadonly" class="room-section glass-card" style="display:none">
                <h3 class="room-section-title">Game Settings</h3>
                <div id="settingsDisplay" class="settings-readonly"></div>
            </div>

            <!-- Start / Wait -->
            <div class="room-actions">
                <button id="startBtn" class="btn btn-accept" style="display:none;">&#9654; Start Game</button>
                <p id="waitMsg" class="wait-for-host" style="display:none;">&#9203; Waiting for <strong id="hostNameWait">the host</strong> to start the game&hellip;</p>
            </div>
        </main>

        <!-- Chat Widget -->
        <div id="chatWidget" class="chat-widget">
            <button id="chatToggle" class="chat-toggle">&#128172; <span id="chatBadge" class="chat-badge" style="display:none">0</span></button>
            <div id="chatPanel" class="chat-panel" style="display:none">
                <div class="chat-header"><span>Room Chat</span><button id="chatClose" class="chat-close">&#x2715;</button></div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-row"><input id="chatInput" class="chat-input" placeholder="Type a message&#8230;" maxlength="500"><button id="chatSend" class="chat-send">&#10148;</button></div>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="/js/avatarCache.js"></script>
    <script src="/js/yahtzee-room.js"></script>
    <div class="ham-overlay" onclick="hamClose()"></div>
    <nav class="ham-drawer" aria-label="Navigation menu">
        <div class="ham-drawer-header">
            <div class="ham-drawer-logo"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <button class="ham-close" onclick="hamClose()" aria-label="Close menu">&#10005;</button>
        </div>
        <div class="ham-menu">
            <button id="backBtn" class="ham-item">&#8592; Back to Lobby</button>
        </div>
    </nav>
    <script src="/js/hamburger.js"></script>
</body>
</html>
