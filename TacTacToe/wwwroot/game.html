<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TacTacToe &#8211; Game</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="ambient"></div>
    <div class="noise"></div>
    <div class="page-content">
        <nav class="navbar">
            <div class="logo-sm"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <button id="backBtn" class="btn-logout">Back to Lobby</button>
        </nav>
        <main class="game-container">
            <div class="game-players">
                <div id="playerX" class="game-player">
                    <span class="mark mark-x">X</span>
                    <span class="player-name" id="xName"></span>
                </div>
                <div class="vs">VS</div>
                <div id="playerO" class="game-player">
                    <span class="mark mark-o">O</span>
                    <span class="player-name" id="oName"></span>
                </div>
            </div>
            <div id="turnIndicator" class="turn-indicator"></div>
            <div id="board" class="board">
                <div class="cell" data-i="0"></div>
                <div class="cell" data-i="1"></div>
                <div class="cell" data-i="2"></div>
                <div class="cell" data-i="3"></div>
                <div class="cell" data-i="4"></div>
                <div class="cell" data-i="5"></div>
                <div class="cell" data-i="6"></div>
                <div class="cell" data-i="7"></div>
                <div class="cell" data-i="8"></div>
            </div>
            <div id="resultOverlay" class="result-overlay" style="display:none">
                <div class="result-card">
                    <h2 id="resultText"></h2>
                    <div id="rematchArea" style="display:none;">
                        <p id="rematchStatus" class="rematch-status"></p>
                        <button id="playAgainBtn" class="btn btn-accept" style="margin-bottom:0.75rem;">&#8635; Play Again</button>
                    </div>
                    <button id="backToLobby" class="btn btn-outline">Back to Lobby</button>
                </div>
            </div>
        </main>

        <!-- Chat Widget -->
        <div id="chatWidget" class="chat-widget">
            <button id="chatToggle" class="chat-toggle">&#128172; <span id="chatBadge" class="chat-badge" style="display:none">0</span></button>
            <div id="chatPanel" class="chat-panel" style="display:none">
                <div class="chat-header"><span>Game Chat</span><button id="chatClose" class="chat-close">&#x2715;</button></div>
                <div id="chatMessages" class="chat-messages"></div>
                <div class="chat-input-row"><input id="chatInput" class="chat-input" placeholder="Type a message&#8230;" maxlength="500"><button id="chatSend" class="chat-send">&#10148;</button></div>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/microsoft-signalr/8.0.0/signalr.min.js"></script>
    <script src="/js/game.js"></script>
</body>
</html>
