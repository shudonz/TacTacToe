<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>TacTacToe &#8211; Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link href="/css/style.css" rel="stylesheet">
</head>
<body>
    <div class="ambient"></div>
    <div class="noise"></div>
    <div class="page-content">

        <nav class="navbar">
            <button class="ham-btn" onclick="hamOpen()" aria-label="Open menu">
                <span></span><span></span><span></span>
            </button>
            <div class="logo-sm">
                <span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span>
                <span class="admin-badge">Admin</span>
            </div>
            <a href="/profile" class="nav-profile-btn" title="Edit Profile">
                <span id="navbarAvatarEmoji" class="nav-profile-emoji" style="display:none"></span>
                <img id="navbarAvatarImg" class="nav-profile-img" src="" alt="Profile" style="display:none">
                <span id="navbarAvatarPlaceholder" class="nav-profile-placeholder">&#128100;</span>
            </a>
        </nav>

        <main class="admin-main">

            <!-- ── Tab bar ── -->
            <div class="admin-tabs">
                <button class="admin-tab active" data-tab="stats">&#128202; Overview</button>
                <button class="admin-tab" data-tab="users">&#128101; Users</button>
                <button class="admin-tab" data-tab="sessions">&#127922; All Scores</button>
            </div>

            <!-- ══════════════════════════════════════════════
                 OVERVIEW / STATS TAB
            ════════════════════════════════════════════════ -->
            <section id="tab-stats" class="admin-panel">
                <div class="admin-panel-header">
                    <h2 class="admin-section-title">Platform Overview</h2>
                    <button id="statsRefresh" class="admin-btn">&#8635; Refresh</button>
                </div>
                <div id="statsContent">
                    <p class="admin-loading">Loading&#8230;</p>
                </div>
            </section>

            <!-- ══════════════════════════════════════════════
                 USERS TAB
            ════════════════════════════════════════════════ -->
            <section id="tab-users" class="admin-panel" style="display:none">
                <div class="admin-panel-header">
                    <h2 class="admin-section-title">Manage Users</h2>
                    <div class="admin-filter-row">
                        <input id="userSearch" class="admin-search" type="search" placeholder="&#128269; Search by name&#8230;" />
                        <select id="userStatusFilter" class="admin-select">
                            <option value="">All Users</option>
                            <option value="banned">Banned</option>
                            <option value="admin">Admins</option>
                            <option value="active">Active (7d)</option>
                        </select>
                    </div>
                </div>
                <div class="admin-table-wrap" id="usersTableWrap">
                    <p class="admin-loading">Loading&#8230;</p>
                </div>
            </section>

            <!-- ══════════════════════════════════════════════
                 SESSIONS TAB
            ════════════════════════════════════════════════ -->
            <section id="tab-sessions" class="admin-panel" style="display:none">
                <div class="admin-panel-header">
                    <h2 class="admin-section-title">All Game Scores</h2>
                    <div class="admin-filter-row">
                        <input id="sessionSearch" class="admin-search" type="search" placeholder="&#128269; Filter by player&#8230;" />
                        <select id="sessionGameFilter" class="admin-select">
                            <option value="">All Games</option>
                            <option>TicTacToe</option>
                            <option>Yahtzee</option>
                            <option>Slots</option>
                            <option>Concentration</option>
                            <option>Solitaire</option>
                        </select>
                    </div>
                </div>
                <div class="admin-table-wrap" id="sessionsTableWrap">
                    <p class="admin-loading">Loading&#8230;</p>
                </div>
            </section>

        </main>
    </div>

    <!-- ── Confirm modal ── -->
    <div id="confirmModal" class="admin-modal-backdrop" style="display:none">
        <div class="admin-modal">
            <p id="confirmMsg" class="admin-modal-msg"></p>
            <div class="admin-modal-actions">
                <button id="confirmYes" class="btn btn-danger">Confirm</button>
                <button id="confirmNo"  class="btn btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <!-- ── Reset-password modal ── -->
    <div id="pwModal" class="admin-modal-backdrop" style="display:none">
        <div class="admin-modal">
            <h3 class="admin-modal-title">Reset Password</h3>
            <p id="pwModalUser" class="admin-modal-sub"></p>
            <input id="pwInput" type="password" class="guest-input" placeholder="New password (8+ characters)" maxlength="128" autocomplete="new-password" />
            <div class="admin-modal-actions" style="margin-top:0.75rem">
                <button id="pwSave" class="btn btn-accept">Save</button>
                <button id="pwCancel" class="btn btn-outline">Cancel</button>
            </div>
            <p id="pwError" class="login-error" style="display:none;margin-top:0.5rem"></p>
        </div>
    </div>

    <!-- ── Ban modal ── -->
    <div id="banModal" class="admin-modal-backdrop" style="display:none">
        <div class="admin-modal">
            <h3 class="admin-modal-title">&#128683; Ban User</h3>
            <p id="banModalUser" class="admin-modal-sub"></p>
            <p style="font-size:0.8rem;color:var(--text-dim);margin:0 0 0.6rem">
                Banned users cannot log in. This takes effect on their next login attempt.
            </p>
            <input id="banReasonInput" type="text" class="guest-input"
                   placeholder="Reason (optional)" maxlength="200" autocomplete="off" />
            <div class="admin-modal-actions" style="margin-top:0.75rem">
                <button id="banConfirm" class="btn btn-danger">Ban User</button>
                <button id="banCancel"  class="btn btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <script src="/js/admin.js"></script>
    <div class="ham-overlay" onclick="hamClose()"></div>
    <nav class="ham-drawer" aria-label="Navigation menu">
        <div class="ham-drawer-header">
            <div class="ham-drawer-logo"><span class="logo-x">Tac</span><span class="logo-o">Tac</span><span class="logo-x">Toe</span></div>
            <button class="ham-close" onclick="hamClose()" aria-label="Close menu">&#10005;</button>
        </div>
        <div class="ham-user-section" style="cursor:default">
            <span id="adminName" class="ham-user-name"></span>
        </div>
        <div class="ham-menu">
            <a href="/lobby" class="ham-item">&#8592; Lobby</a>
            <div class="ham-divider"></div>
            <form method="post" action="/logout">
                <button type="submit" class="ham-item ham-item-danger">&#128682; Logout</button>
            </form>
        </div>
    </nav>
    <script src="/js/hamburger.js"></script>
</body>
</html>
